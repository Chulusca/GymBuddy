services:
  telegram-bot:
    build: .
    container_name: tg_bot_dev
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    command: npm run dev
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: gymbuddy_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: gymbuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: